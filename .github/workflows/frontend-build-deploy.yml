name: Frontend Build & (Optional) Deploy

on:
  push:
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          npm ci
      - name: Build
        run: |
          npm run build --if-present

  # Optional: deploy to Vercel or Netlify. To enable, add appropriate secrets
  # and uncomment the deploy step below, or configure GitHub integration on
  # the hosting provider.

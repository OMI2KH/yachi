name: Frontend CI & Deploy

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build || echo "Build command failed or not defined."

      - name: Upload production build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist || frontend/.next || frontend/build || frontend/public

      - name: Deploy to Vercel (optional)
        if: secrets.VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm i -g vercel && vercel --prod --token $VERCEL_TOKEN --confirm
